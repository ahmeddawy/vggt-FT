defaults:
  - frozen_agg_pretrained_1gpu_50ep
  - _self_

# 8-GPU throughput-oriented variant (keeps training behavior close, reduces overhead).
exp_name: gcs_stage1_8gpu_fast_imgnums_12_28_nodup_lr2e4

val_epoch_freq: 10
limit_val_batches: 200

logging:
  log_freq: 10

checkpoint:
  save_freq: 10

optim:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 2e-4
    weight_decay: 0.05
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 2e-4
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 2e-4
              end_value: 1e-6
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
